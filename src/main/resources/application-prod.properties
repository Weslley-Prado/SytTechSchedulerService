# ═══════════════════════════════════════════════════════════════
# Profile: PROD — PostgreSQL + Flyway
# Ativar: java -jar app.jar --spring.profiles.active=prod
# ═══════════════════════════════════════════════════════════════
server.port=${SERVER_PORT:8082}
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/syttechscheduler}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=10000

# JPA / Hibernate — NUNCA use create/update em producao
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway — controle de schema versionado
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
spring.flyway.table=flyway_schema_history
spring.flyway.clean-disabled=true

# Desabilitados em producao
spring.docker.compose.enabled=false

# ═══════════════════════════════════════════════════════════════
# E-mail — produção: SMTP real com autenticação + STARTTLS
# Exporte: SYTTECH_EMAIL_ENABLED=true, MAIL_HOST, MAIL_PORT=587,
#          MAIL_USERNAME, MAIL_PASSWORD, SYTTECH_EMAIL_FROM,
#          SYTTECH_APP_BASE_URL
# ═══════════════════════════════════════════════════════════════
syttech.email.enabled=${SYTTECH_EMAIL_ENABLED:true}
spring.mail.port=${MAIL_PORT:587}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}

