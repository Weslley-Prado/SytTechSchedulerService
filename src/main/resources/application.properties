spring.application.name=syttech.scheduler

# ═══════════════════════════════════════════════════════════════
# Profile padrão: dev
# Para produção: java -jar app.jar --spring.profiles.active=prod
# ═══════════════════════════════════════════════════════════════
spring.profiles.active=dev

# ═══════════════════════════════════════════════════════════════
# JPA — comum a todos os profiles
# ═══════════════════════════════════════════════════════════════
spring.jpa.open-in-view=false

# ═══════════════════════════════════════════════════════════════
# Segurança — JWT HS256 (HmacJwtTokenIssuerAdapter)
# Em produção sobrescreva via env: SYTTECH_SECURITY_JWT_SECRET
# ═══════════════════════════════════════════════════════════════
syttech.security.jwt.secret=${SYTTECH_JWT_SECRET:change-me-change-me-change-me-change-me}
syttech.security.jwt.access-ttl-seconds=${SYTTECH_JWT_TTL:3600}
syttech.security.jwt.issuer=syttech.scheduler

# ═══════════════════════════════════════════════════════════════
# E-mail — SMTP (Jakarta Mail) via spring-boot-starter-mail
# Quando syttech.email.enabled=false (default) usa LoggingEmailNotificationAdapter.
# Em produção exporte: SYTTECH_EMAIL_ENABLED=true e MAIL_HOST/USERNAME/PASSWORD.
# ═══════════════════════════════════════════════════════════════
syttech.email.enabled=${SYTTECH_EMAIL_ENABLED:false}
syttech.email.from=${SYTTECH_EMAIL_FROM:no-reply@syttech.local}
syttech.email.app-base-url=${SYTTECH_APP_BASE_URL:http://localhost:8082}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

