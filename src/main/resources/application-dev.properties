# ═══════════════════════════════════════════════════════════════
# Profile: DEV — PostgreSQL local (compose.yaml) + Flyway
# Ativado por padrão (spring.profiles.active=dev)
# ═══════════════════════════════════════════════════════════════

# ── Datasource ──────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/syttechscheduler}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:myuser}
spring.datasource.password=${DB_PASSWORD:secret}

# ── Connection Pool (HikariCP) ──────────────────────────────────
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=10000

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ── Server ────────────────────────────────────────────────────
server.port=8082

# ── Docker Compose (desabilitado em dev) ──────────────────────
spring.docker.compose.enabled=false

